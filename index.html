    #steps .stepBtn .stepDot{ position:relative; z-index:1; width:24px; height:24px; border-radius:999px; display:grid; place-items:center; font-size:11px; font-weight:700; color:#98A0B5; background:#F7F8FC; border:1px solid #E3E6EF; transition:all .18s ease; }
    #steps .stepBtn .stepText{ font-size:11px; line-height:1.18; font-weight:600; max-width:92%; letter-spacing:-0.01em; white-space:normal; }
    #steps .stepBtn.active .stepDot{ background:#EAF0FF; border-color:#D7E2FF; color:var(--primary); }
    #steps .stepBtn.done .stepDot{ background:var(--primary); border-color:var(--primary); color:#fff; }
    #steps .stepBtn.done::after, #steps .stepBtn.active::after{ background:var(--primary); }
    #steps .stepBtn.active .stepText, #steps .stepBtn.done .stepText{ color:var(--primary); }
    #steps .stepBtn.locked{ opacity:.72; }

    .catTiles{ gap:12px; }
    .catTile{ position:relative; min-height:0; height:160px; background:#EEF1F8; border:1px solid transparent; border-radius:26px; padding:16px; box-shadow:none; overflow:hidden; }
    .catTile.active{ background:linear-gradient(135deg,#2A57F3 0%, #1749D9 100%); border-color:transparent; box-shadow:0 12px 24px rgba(23,73,217,.20); }
    .catTileIcon{ position:absolute; inset:auto 6px 0 auto; width:58%; height:78%; margin:0; border-radius:0; background:transparent; justify-content:flex-end; align-items:flex-end; pointer-events:none; }
    .catTileImg{ object-fit:contain; object-position:right bottom; background:transparent; width:100%; height:100%; }
    .catTileLabel{ position:absolute; left:18px; top:18px; z-index:1; font-size:16px; font-weight:500; line-height:1.15; color:var(--text); max-width:52%; }
    .catTile.active .catTileLabel{ color:#fff; }

    .list{ gap:12px; }
    .item{ flex-direction:column; align-items:stretch; gap:12px; }
    .card.item{ padding:16px; border-radius:18px; background:#fff; box-shadow:none; }
    .card.item .row{ width:100%; gap:10px; flex-wrap:nowrap; }
    .card.item .row button{ flex:1 1 0; width:100%; justify-content:center; }

    .summaryCardBlock{ display:flex; flex-direction:column; gap:4px; padding:4px 0; }
    .summaryLabel{ display:block; font-size:11px; line-height:1.2; color:var(--muted); font-weight:600; margin-bottom:3px; }
    .summaryValue{ font-size:14px; line-height:1.35; color:var(--text); font-weight:600; }
    .summaryList{ margin:6px 0 0 18px; padding:0; color:var(--text); }
    .summaryList li{ margin:0 0 4px; }
    .sendCard .actions{ grid-template-columns:1fr; }
    .sendCard .actions button{ justify-content:center; }
    .thumbCard{ border-radius:16px; border:1px solid var(--line); }
    .thumbImg{ border-radius:12px; }

    @media (max-width:420px){
      .brandLogo{ height:40px; }
      .stepH1, .screenSectionTitle{ font-size:18px; margin-bottom:12px; }
      .processHeroTitle{ font-size:16px; line-height:1.22; }
      #steps .stepBtn .stepText{ font-size:9px; }
      #steps{ gap:6px; }
      .catTile{ height:128px; border-radius:18px; }
      .catTileLabel{ left:14px; top:14px; font-size:14px; max-width:58%; }
      .catTileIcon{ width:60%; height:74%; right:4px; }
    }

  </style>

    "rules": [
      {
        "id": "r_damage_element_dictionary_by_category",
        "when": {
          "field": "f_damage_category"
        },
        "actions": [
          {
            "type": "set_dictionary",
            "field_id": "f_damage_element",
            "by_value": {
              "Помещение": "d_element_room",
              "Здание": "d_element_building",
              "Остекление": "d_element_glazing"
            },
            "else": null
          },
          {
            "type": "clear_fields",
            "field_ids": [
              "f_damage_element",
              "f_damage_subelement"
            ]
          }
        ],
        "note": "При смене категории обновляется справочник элементов; значения элемента/подэлемента очищаются."
      },
      {
        "id": "r_damage_subelement_dictionary_by_category_element",
        "when": {
          "fields": [
            "f_damage_category",
            "f_damage_element"
          ]
        },
        "actions": [
          {
            "type": "set_dictionary_and_visibility",
            "field_id": "f_damage_subelement",
            "cases": [
              {
                "if": {
                  "category": "Помещение",
                  "element": "Потолок"
                },
                "dictionary_id": "d_room_ceiling_subelement",
                "visible": true,
                "required": true
              },
              {
                "if": {
                  "category": "Помещение",
                  "element": "Стена"
                },
                "dictionary_id": "d_room_wall_subelement",
                "visible": true,
                "required": true
              },
              {
                "if": {
                  "category": "Помещение",
                  "element": "Пол"
                },
                "dictionary_id": "d_room_floor_subelement",
                "visible": true,
                "required": true
              },
              {
                "if": {
                  "category": "Здание",
                  "element": "Фасад"
                },
                "dictionary_id": "d_building_facade_subelement",
                "visible": true,
                "required": true
              },
              {
                "if": {
                  "category": "Здание",
                  "element": "Крыша"
                },
                "dictionary_id": "d_building_roof_subelement",
                "visible": true,
                "required": true
              },
              {
                "if": {
                  "category": "Здание",
                  "element": "Архитектурные элементы"
                },
                "dictionary_id": "d_building_arch_subelement",
                "visible": true,
                "required": true
              },
              {
                "if": {
                  "category": "Здание",
                  "element": "Конструктивные элементы"
                },
                "dictionary_id": "d_building_construct_subelement",
                "visible": true,
                "required": true
              }
            ],
            "default": {
              "visible": false,
              "required": false,
              "dictionary_id": null
            }
          },
          {
            "type": "clear_fields",
            "field_ids": [
              "f_damage_subelement"
            ]
          }
        ],
        "note": "Показывать/скрывать Подэлемент в зависимости от выбранного элемента."
      },
      {
        "id": "r_clear_damage_size_on_selectors_change",
        "when": {
          "fields": [
            "f_damage_category",
            "f_damage_element",
            "f_damage_subelement"
          ]
        },
        "actions": [
          {
            "type": "clear_fields",
            "field_ids": [
              "f_damage_size"
            ]
          }
        ],
        "note": "При изменении Категории/Элемента/Подэлемента сбрасывать размеры повреждения, чтобы значения не переносились между разными объектами."
      },
      {
        "id": "r_details_by_material_window",
        "when": {
          "field": "f_window_material"
        },

          {
            "type": "set_dictionary_and_visibility",

                  "value": "Дерево"
                },
                "dictionary_id": "d_wood_species",
                "visible": true,
                "required": true
              },
              {
                "if": {

                },
                "dictionary_id": "d_metal_details",
                "visible": true,
                "required": true
              }
            ],
            "default": {
              "visible": false,
              "required": false,
              "dictionary_id": null,
              "clear": true
            }
          }
        ]
      },

                "if": {
                  "category": "Здание",

                "hide": [

                  "subelement": "Обшивка",

                },
                "show": [

                  "subelement": "Обшивка",
                  "view": "Термодревисина"
                },
                "show": [

                  "category": "Здание",
                  "element": "Фасад",
                  "subelement": "Обшивка",
                  "view": "Сайдинг"
                },
                "show": [

                    "field_id": "f_type",
                    "dictionary_id": "d_facade_siding_type",
                    "required": true
                  }

                  "category": "Здание",
                  "element": "Фасад",
                  "subelement": "Обшивка",
                  "view": "Имитация бруса"
                },
                "hide": [
                  "f_material",
                  "f_type"
                ]
              }
            ],
            "default": {
              "hide": [
                "f_material",
                "f_type"
              ]
            }

// User interaction timestamp + pending focus target (prevents "double tap" after re-render)

let __lastUserPointerTs = 0;
let __pendingFocus = null; // { key, ts }

function __pickFocusKeyFromEventTarget(t) {
  try {
    const el = t && t.closest ? t.closest('[data-fid],input,textarea,select') : t;
    if (!el || !el.getAttribute) return null;
    const fid = el.getAttribute('data-fid');
    if (fid) return fid;
    if (el.id) return el.id;
    if (el.name) return el.name;
  } catch {}
  return null;
}

function __markUserPointer(e) {
  __lastUserPointerTs = Date.now();
  const key = __pickFocusKeyFromEventTarget(e && e.target);
  if (key) __pendingFocus = { key, ts: Date.now() };
}

const DatePicker = (() => {
  function parseIso(iso) {
    if (!iso) return null;
    const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return null;
    const [, y, mm, dd] = m;
    const d = new Date(Number(y), Number(mm) - 1, Number(dd));
    if (Number.isNaN(d.getTime())) return null;
    return d;
  }
  function fmtIso(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${dd}`;
  }
  function clampToMax(d, maxIso) {
    if (!maxIso) return d;
    const max = parseIso(maxIso);
    if (!max) return d;
    if (d.getTime() > max.getTime()) return max;
    return d;
  }
  function open({ valueIso, maxIso, onSelect }) {
    const now = valueIso ? (parseIso(valueIso) || new Date()) : new Date();
    let current = clampToMax(now, maxIso);
    const overlay = document.createElement("div");
    overlay.className = "datePickerOverlay";
    const card = document.createElement("div");
    card.className = "datePickerCard";
    overlay.appendChild(card);
    const header = document.createElement("div");
    header.className = "datePickerHeader";
    const prevBtn = document.createElement("button");
    prevBtn.type = "button";
    prevBtn.className = "ghost miniBtn";
    prevBtn.textContent = "‹";
    const titleEl = document.createElement("div");
    const nextBtn = document.createElement("button");
    nextBtn.type = "button";
    nextBtn.className = "ghost miniBtn";
    nextBtn.textContent = "›";
    header.appendChild(prevBtn);
    header.appendChild(titleEl);
    header.appendChild(nextBtn);
    card.appendChild(header);
    const week = document.createElement("div");
    week.className = "datePickerWeek";
    for (const d of ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"]) {
      const w = document.createElement("div");
      w.textContent = d;
      week.appendChild(w);
    }
    card.appendChild(week);
    const grid = document.createElement("div");
    grid.className = "datePickerGrid";
    card.appendChild(grid);
    const today = new Date();
    const todayIso = fmtIso(today);
    function render() {
      const y = current.getFullYear();
      const m = current.getMonth();
      titleEl.textContent = current.toLocaleString("ru-RU", { month:"long", year:"numeric" });
      grid.replaceChildren();
      const first = new Date(y, m, 1);
      const startIdx = (first.getDay() + 6) % 7;
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      for (let i = 0; i < startIdx; i++) grid.appendChild(document.createElement("div"));
      for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(y, m, d);
        const iso = fmtIso(date);
        if (maxIso && iso > maxIso) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "datePickerDay disabled";
          btn.textContent = String(d);
          btn.disabled = true;
          grid.appendChild(btn);
          continue;
        }
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "datePickerDay";
        if (iso === todayIso) btn.classList.add("today");
        if (valueIso && iso === valueIso) btn.classList.add("selected");
        btn.textContent = String(d);
        btn.addEventListener("click", () => {
  if (btn.disabled) return;
  UIValidation.markTouched("step3", "f_photos", idx);
  input.click();
});

    const errEl = el("div", { class: "fieldError", text: "" });
    fieldsCard.appendChild(errEl);
    if (required) fieldUi.set(fid, { starEl, errEl });

    // initial render
    rebuildGrid();
  };

  for (const tf of (tmpl.fields || [])) {
    const fid = tf.field_id;

    // не рендерим selectors повторно
    if (fid === F_CAT || fid === F_EL) continue;
    if (fid === F_SUB && showSubelement) continue;

    const def = fieldsById.get(fid);
    if (!def) {
      fieldsCard.appendChild(el("div", { class:"err", text:`Config ошибка: поле "${fid}" отсутствует в cfg.fields[]` }));
      continue;
    }

    if (!isVisible(fid)) {
      // если скрыто — показывать не надо
      continue;
    }

    const required = getFinalRequired(fid);
    const dictId = (def.type === "select") ? getFinalDictId(fid) : null;

    if (def.type === "text") renderTextField(fid, def, required);
    else if (def.type === "textarea") renderTextareaField(fid, def, required);
    else if (def.type === "date") renderDateField(fid, def, required);
    else if (def.type === "number") renderNumberField(fid, def, required);
    else if (def.type === "select") renderSelectField(fid, def, required, dictId);
    else if (def.type === "group_xy" || def.type === "group_xyz") renderGroupField(fid, def, required);
    else if (fid === "f_photos") renderPhotosField(fid, def, required);
    else {
      fieldsCard.appendChild(el("div", { class:"err", text:`Пока не поддержан type="${def.type}" для поля ${fid} на Step3.` }));
    }
  }

  root.appendChild(fieldsCard);

    // actions: добавить новое повреждение и сразу открыть его редактирование
  const addMoreRow = el("div", { class:"actions" }, [
    el("button", {
      type:"button",

      text:"Добавить повреждение",
      onclick: () => Store.update(d => {
        if (!Array.isArray(d.damage_items)) d.damage_items = [];
        d.damage_items.push({});
        d.current_damage_index = d.damage_items.length - 1;
        d.stepId = "step3";
      })
    }),
  ]);
  root.appendChild(addMoreRow);

  // nav buttons (next disabled when required missing)
  const nav = navButtons({
    canPrev:true,
    canNext:true,
    nextDisabled: true, // обновим ниже
    onPrev: () => goPrev(cfg, "step3"),
    onNext: () => {
  const missing = computeMissing();
  const stNow2 = Store.get();
  const anyComplete = hasAnyCompleteDamage(cfg, stNow2.damage_items);

  // Если НЕТ ни одного готового повреждения и текущее не заполнено — не пускаем.
  if (!anyComplete && missing.length) {
    UIValidation.markAttempt("step3", idx);
    refreshStep3Ui();
    return;
  }

  // Иначе можно перейти к списку (даже если текущее — черновик)
  goNext(cfg, "step3");
},
    nextText: "Продолжить"
  });

  // получить ссылку на next button (кнопки в StickyFooter, nav — это comment-заглушка)
  nextBtn = document.querySelector("#stickyFooterInner button.primary");
  root.appendChild(nav);

  refreshStep3Ui();
}
// pdf-mvp.js
// MVP raster PDF (canvas -> JPEG -> PDF) with damage_items listing from Config.DB.export.pdf.damage_item.*
// Keeps: centered title, photo grid cell 90x60mm, gapCol=1.5mm, gapRow=5mm.

const PdfMvp = {
  async generateMvpPdf({ config, state, photosById, dpi = 150 }) {
    const A4 = { wMm: 210, hMm: 297 };
    const pxPerMm = dpi / 25.4;

    const pageWpx = Math.round(A4.wMm * pxPerMm);
    const pageHpx = Math.round(A4.hMm * pxPerMm);

    const margin = { leftMm: 20, rightMm: 15, topMm: 25, bottomMm: 20 };
    const left = Math.round(margin.leftMm * pxPerMm);
    const right = Math.round(margin.rightMm * pxPerMm);
    const top = Math.round(margin.topMm * pxPerMm);
    const bottom = Math.round(margin.bottomMm * pxPerMm);

    const contentW = pageWpx - left - right;
    const contentH = pageHpx - top - bottom;

    const font12 = Math.round((12 * dpi) / 72);
    const font14 = Math.round((14 * dpi) / 72);
    const lh = Math.round(font12 * 1.35);

    const omitValues = new Set((config?.export?.pdf?.omit_values || []).map(String));

    const selectors = config?.inventory?.damage_item?.selectors;
    if (!selectors?.category?.field_id || !selectors?.element?.field_id || !selectors?.subelement?.field_id) {
      throw new Error("Config selectors missing for damage_item");
    }
    const fidCat = selectors.category.field_id;
    const fidEl = selectors.element.field_id;
    const fidSub = selectors.subelement.field_id;

    const fieldsById = new Map((config.fields || []).map(f => [f.id, f]));

    const cellMm = { w: 90, h: 60 };
    const gapColMm = 1.5;
    const gapRowMm = 5;

    const cellW = Math.round(cellMm.w * pxPerMm);
    const cellH = Math.round(cellMm.h * pxPerMm);
    const gapCol = Math.round(gapColMm * pxPerMm);
    const gapRow = Math.round(gapRowMm * pxPerMm);

    const cols = config?.export?.pdf?.damage_item?.photos_layout?.columns ?? 2;
    const maxPhotos = config?.export?.pdf?.damage_item?.photos_layout?.max_photos ?? 10;

    const titleParts = config?.export?.pdf?.damage_item?.title_parts || ["category", "element", "subelement"];
    const fieldsFromTemplate = !!config?.export?.pdf?.damage_item?.fields_from_template;

    // ---------- helpers ----------
    const mmToPx = (mm) => Math.round(mm * pxPerMm);

    const fmtDate = (iso) => {
      if (!iso || typeof iso !== "string") return "";
      const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return iso;
      return `${m[3]}.${m[2]}.${m[1]}`;
    };

    const choiceToText = (v) => {
      if (v == null) return "";
      if (typeof v === "string") return v;
      if (typeof v === "object") {
        const c = v.choice ?? v.Choice ?? v.choice_value;
        const o = v.other ?? v.Other ?? v.other_text;
        if (c === "Иное" && o) return String(o);
        if (c && o) return `${c}: ${o}`;
        if (c) return String(c);
      }
      return String(v);
    };

    const formatValue = (fieldDef, v) => {
      if (v == null) return "";
      if (!fieldDef) return choiceToText(v);

      if (fieldDef.type === "date") return fmtDate(String(v));
      if (fieldDef.type === "number") return (typeof v === "number" ? String(v) : String(Number(v)));
      if (fieldDef.type === "select") return choiceToText(v);

      if (fieldDef.type === "group_xy" && typeof v === "object") {
        const x = v.x, y = v.y, unit = v.unit;
        if (Number.isFinite(x) && Number.isFinite(y) && unit) return `${x} × ${y} ${unit}`;
        return "";
      }
      if (fieldDef.type === "group_xyz" && typeof v === "object") {
        const x = v.x, y = v.y, z = v.z, unit = v.unit;
        if (Number.isFinite(x) && Number.isFinite(y) && Number.isFinite(z) && unit) return `${x} × ${y} × ${z} ${unit}`;
        return "";
      }
      if (fieldDef.type === "photos") return ""; // never print as text

      return String(v);
    };

    function matchTemplate(damageItem) {
      const templates = config?.inventory?.damage_item?.templates || [];
    
      const getChoice = (v) => {
        if (v == null) return "";
        if (typeof v === "object") return String(v.choice ?? v.Choice ?? v.choice_value ?? "");
        return String(v);
      };
    
      const cat = getChoice(damageItem?.[fidCat] ?? damageItem?.category);
      const el  = getChoice(damageItem?.[fidEl]  ?? damageItem?.element);
      const sub = getChoice(damageItem?.[fidSub] ?? damageItem?.subelement);
    
      let best = null;
      let bestScore = -1;
    
      for (const t of templates) {
        const w = t?.when || {};
    
        if (w.category && String(w.category) !== cat) continue;
    
        // element
        if (w.element != null) {
          if (String(w.element) !== el) continue;
        } else if (Array.isArray(w.element_in)) {
          if (!w.element_in.map(String).includes(el)) continue;
        }
    
        // subelement
        if (w.subelement != null) {
          if (!sub) continue;
          if (String(w.subelement) !== sub) continue;
        } else if (Array.isArray(w.subelement_in)) {
          if (!sub) continue;
          if (!w.subelement_in.map(String).includes(sub)) continue;
        }
    
        // score: exact > *_in > none
        let score = 1;
        if (w.element != null) score += 2;
        else if (Array.isArray(w.element_in)) score += 1;
    
        if (w.subelement != null) score += 2;
        else if (Array.isArray(w.subelement_in)) score += 1;
    
        if (score > bestScore) { best = t; bestScore = score; }
      }
    
      return best;
    }    

    function buildDamageTitle(di) {
      const parts = [];
      for (const p of titleParts) {
        if (p === "category") parts.push(choiceToText(di?.[fidCat] ?? di?.category));
        else if (p === "element") parts.push(choiceToText(di?.[fidEl] ?? di?.element));
        else if (p === "subelement") parts.push(choiceToText(di?.[fidSub] ?? di?.subelement));        
      }
      return parts.filter(Boolean).join(" / ");
    }

    async function blobToImageBitmap(blob) {
      // blob may already be a Blob
      if (!(blob instanceof Blob)) throw new Error("photosById must contain Blob values");
      return await createImageBitmap(blob);
    }

    function drawWrappedText(ctx, text, x, y, maxW, lineH) {
      const s = String(text ?? "").trim();
      if (!s) return y + lineH; // ключевое: пустое значение всё равно занимает строку
    
      const words = s.split(/\s+/).filter(Boolean);
      let line = "";
    
      for (const w of words) {
        const test = line ? (line + " " + w) : w;
        if (ctx.measureText(test).width <= maxW) {
          line = test;
        } else {
          ctx.fillText(line, x, y);
          pageHasContent = true;
          y += lineH;
          line = w;
        }
      }
    
      if (line) {
        ctx.fillText(line, x, y);
        pageHasContent = true;
        y += lineH;
      }
      return y;
    }  
    function countWrappedLines(ctx, text, maxW) {
  const s = String(text ?? "").trim();
  if (!s) return 1;

  const words = s.split(/\s+/).filter(Boolean);
  let line = "";
  let lines = 0;

  for (const w of words) {
    const test = line ? (line + " " + w) : w;
    if (ctx.measureText(test).width <= maxW) {
      line = test;
    } else {
      lines += 1;
      line = w;
    }
  }
  if (line) lines += 1;
  return Math.max(1, lines);
}

function wrapWordsToLines(ctx, words, maxW) {
  const lines = [];
  let line = "";

  for (const w of words) {
    const test = line ? (line + " " + w) : w;
    if (ctx.measureText(test).width <= maxW) {
      line = test;
    } else {
      if (line) lines.push(line);
      line = w;
    }
  }
  if (line) lines.push(line);

  return lines;
}

  // ---------- page rendering ----------
const canvases = [];
let canvas = null;
let ctx = null;
let pageHasContent = false;
let pageNo = 0; // текущий номер СТРАНИЦЫ (первая будет 1, но цифру на ней не рисуем)

function drawPageNumberIfNeeded() {
  // Номера ставим начиная со 2-й страницы
  if (pageNo < 2) return;

  const oldFont = ctx.font;
  const oldAlign = ctx.textAlign;
  const oldBaseline = ctx.textBaseline;
  const oldFill = ctx.fillStyle;

  ctx.fillStyle = "#000";
  ctx.font = `${font12}px Arial, sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "top";

  // по центру страницы
  const x = ctx.canvas.width / 2;

  // минимум 10 мм от верхнего края
  const y = mmToPx(10);

  ctx.fillText(String(pageNo), x, y);
  pageHasContent = true;

  ctx.font = oldFont;
  ctx.textAlign = oldAlign;
  ctx.textBaseline = oldBaseline;
  ctx.fillStyle = oldFill;
}

function newPage() {
  if (canvas && pageHasContent) {
  drawPageNumberIfNeeded();   // рисуем номер на текущей странице
  canvases.push(canvas);      // и только потом сохраняем страницу
}
pageNo += 1; // начинаем новую страницу: 1, 2, 3...

  canvas = document.createElement("canvas");
  canvas.width = pageWpx;
  canvas.height = pageHpx;

  // alpha:false + белая заливка = никаких “чёрных” страниц
  ctx = canvas.getContext("2d", { alpha: false });
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, pageWpx, pageHpx);
  ctx.fillStyle = "#000";

  pageHasContent = false;
  return { ctx, canvas };
}

const afterPhotosGap = mmToPx(6); // ~6 мм (можно 5-8 мм)
ensureSpace(afterPhotosGap);
cursorY += afterPhotosGap;

            const boxW = lineW;

            const scale = Math.min(boxW / bmp.width, boxH / bmp.height);
            const dw = Math.max(1, Math.round(bmp.width * scale));

            const dx = x1 + Math.round((lineW - dw) / 2) + mmToPx(1); // чуть правее + по центру
            const dy = yLine - dh - mmToPx(0.2); // ближе к линии подписи
            ctx.drawImage(bmp, dx, dy, dw, dh);
          }
        } catch {}
      }

      ctx.restore();
      pageHasContent = true;

}

// Minimal multi-page PDF builder (each page is full-page JPEG)
function buildPdfFromJpegs(jpegPages, A4, dpi) {
  const ptPerIn = 72;
  const wPt = (A4.wMm / 25.4) * ptPerIn;
  const hPt = (A4.hMm / 25.4) * ptPerIn;

  const enc = (s) => new TextEncoder().encode(s);

  const parts = [];
  let offset = 0;

  const objOffsets = []; // index = obj number
  const addBytes = (u8) => { parts.push(u8); offset += u8.length; };
  const addStr = (s) => addBytes(enc(s));

  const beginObj = (n) => { objOffsets[n] = offset; addStr(`${n} 0 obj\n`); };
  const endObj = () => addStr(`endobj\n`);

  const writeStreamObj = (n, dictStr, streamBytes) => {
    beginObj(n);
    addStr(`<< ${dictStr} /Length ${streamBytes.length} >>\nstream\n`);
    addBytes(streamBytes);
    addStr(`\nendstream\n`);
    endObj();
  };

  // Object numbering:
  // 1 Catalog, 2 Pages
  // For each page: Page, Contents, Image  => 3 objects per page
  const pageCount = jpegPages.length;
  const pageObj = [];
  const contentsObj = [];
  const imageObj = [];
  let nextObj = 3;

  for (let i = 0; i < pageCount; i++) {
    pageObj.push(nextObj++);
    contentsObj.push(nextObj++);
    imageObj.push(nextObj++);
  }

  const maxObj = nextObj - 1;
  const size = maxObj + 1;

  // PDF header
  addStr("%PDF-1.3\n%\xE2\xE3\xCF\xD3\n");

  // 1: Catalog
  beginObj(1);
  addStr(`<< /Type /Catalog /Pages 2 0 R >>\n`);
  endObj();

  // 2: Pages root
  const kids = pageObj.map(n => `${n} 0 R`).join(" ");
  beginObj(2);
  addStr(`<< /Type /Pages /Count ${pageCount} /Kids [ ${kids} ] >>\n`);
  endObj();

  // Per-page objects
  for (let i = 0; i < pageCount; i++) {
    const imName = `Im${i + 1}`;

    // Contents stream: draw image full page
    const contentStr =
      `q\n${wPt.toFixed(2)} 0 0 ${hPt.toFixed(2)} 0 0 cm\n/${imName} Do\nQ\n`;
    const contentBytes = enc(contentStr);
    writeStreamObj(contentsObj[i], ``, contentBytes);

    // Image XObject stream (JPEG)
    const jpg = jpegPages[i].bytes;
    const imgDict =
      `/Type /XObject /Subtype /Image /Name /${imName} ` +
      `/Width ${jpegPages[i].wPx} /Height ${jpegPages[i].hPx} ` +
      `/ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode`;
    writeStreamObj(imageObj[i], imgDict, jpg);

    // Page object
    beginObj(pageObj[i]);
    addStr(
      `<< /Type /Page /Parent 2 0 R ` +
      `/MediaBox [0 0 ${wPt.toFixed(2)} ${hPt.toFixed(2)}] ` +
      `/Resources << /XObject << /${imName} ${imageObj[i]} 0 R >> >> ` +
      `/Contents ${contentsObj[i]} 0 R >>\n`
    );
    endObj();
  }

  // xref
  const xrefStart = offset;
  addStr("xref\n");
  addStr(`0 ${size}\n`);
  addStr("0000000000 65535 f \n");

  for (let i = 1; i < size; i++) {
    const off = objOffsets[i] || 0;
    addStr(String(off).padStart(10, "0") + " 00000 n \n");
  }

  // trailer
  addStr(
    `trailer\n<< /Size ${size} /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF\n`
  );

  // concat parts
  const out = new Uint8Array(offset);
  let pos = 0;
  for (const p of parts) { out.set(p, pos); pos += p.length; }
  return out;
}

function renderStep4(root, cfg, st) {
  const step = cfg.ui.steps.find(s => s.id === "step4");
  const h1 = el("h1", { class:"stepH1", tabindex:"-1", text: "Отправка" });
  root.appendChild(h1);

  const fieldsById = indexFieldsById(cfg);

    Store.update(d => { d.form.f_signature_png = sigLocal; }, { skipRender:true });
  }

    if (v == null) return "";
    if (typeof v === "string") return v.trim();
    if (typeof v === "object") {
      const c = v.choice ?? v.Choice;
      const o = v.other ?? v.Other;
      if (c === "Иное" && o) return String(o).trim();
      if (c) return String(c).trim();
    }
    return String(v).trim();
  };

  summaryCard.appendChild(el("div", { text:"Акт осмотра", style:"font-weight:800; margin-bottom:8px;" }));

  const makeBlock = (label, value) => el("div", { class:"summaryCardBlock" }, [
    el("span", { class:"summaryLabel", text:label }),
    el("span", { class:"summaryValue", text:value || "—" })
  ]);

  const insurerLabel = fieldsById.get("f_insurer")?.label || "Страхователь";
  const repLabel = fieldsById.get("f_insurer_rep")?.label || "Представитель страхователя (ФИО)";
  const eventDateLabel = fieldsById.get("f_event_date")?.label || "Дата события";

  summaryCard.appendChild(makeBlock(insurerLabel, fmtChoice(form.f_insurer)));
  summaryCard.appendChild(makeBlock(repLabel, fmtChoice(form.f_insurer_rep)));
  summaryCard.appendChild(makeBlock(eventDateLabel, form.f_event_date ? fmtDateRu(String(form.f_event_date)) : ""));
  summaryCard.appendChild(el("div", { class:"summaryCardBlock", style:"padding-top:8px;" }, [el("span", { class:"summaryLabel", text:"Повреждения" })]));

  const ol = el("ol", { class:"summaryList" });
  const itemsNow = Array.isArray(st?.damage_items) ? st.damage_items : [];
  for (let i = 0; i < itemsNow.length; i++) {
    const di = itemsNow[i] || {};
    const parts = [fmtChoice(di.f_damage_category), fmtChoice(di.f_damage_element), fmtChoice(di.f_damage_subelement)].filter(Boolean);
    ol.appendChild(el("li", { text: parts.length ? parts.join(" / ") : "—" }));
  }
  if (!itemsNow.length) ol.appendChild(el("li", { text:"—" }));
  summaryCard.appendChild(ol);

  const buildPdfFileName = (stateForPdf) => {
    const iso = (stateForPdf?.f_inspection_date || new Date().toISOString().slice(0,10));
    const d = String(iso).replaceAll("-", "");
    const pol = (stateForPdf?.f_policy_number ? String(stateForPdf.f_policy_number) : "акт").replace(/[^\w\-]+/g, "_").slice(0, 40);
    return `Акт_осмотра_${pol}_${d}.pdf`;
  };

  const makePdf = async (btn) => {
    btn.disabled = true;
    try {
      const stNow = Store.get();
      const stateForPdf = { ...(stNow.form || {}), damage_items: (stNow.damage_items || []) };
      const maxPerItem = cfg?.export?.pdf?.damage_item?.photos_layout?.max_photos ?? cfg?.constraints?.photos?.max_per_damage_item ?? 10;
      const ids = [];
      const seen = new Set();
      for (const di of (stateForPdf.damage_items || [])) {
        const arr = Array.isArray(di?.f_photos) ? di.f_photos : [];
        for (const pid of arr.slice(0, maxPerItem)) {
          if (!pid || seen.has(pid)) continue;
          seen.add(pid);
          ids.push(pid);
        }
      }
      const photosById = new Map();
      let done = 0;
      if (ids.length) setStatus(`Формируем акт: загрузка фото ${done}/${ids.length}`, "ok");
      for (const pid of ids) {
        const rec = await Persistence.getImageRecord(pid);
        if (rec?.blob) photosById.set(pid, rec.blob);
        done++;
        if (ids.length && (done % 2 === 0 || done === ids.length)) setStatus(`Формируем акт: загрузка фото ${done}/${ids.length}`, "ok");
      }
      if (ids.length) setStatus("Формируем акт: генерация PDF…", "ok");
      const { pdfBlob } = await PdfMvp.generateMvpPdf({ config: cfg, state: stateForPdf, photosById });
      const fileName = buildPdfFileName(stateForPdf);
      await Persistence.savePdfRecord({ blob: pdfBlob, pdfId:"last", fileName });
      setStatus("Акт осмотра сформирован.", "ok");
      return { pdfBlob, fileName };
    } catch (e) {
      console.error(e);
      setStatus("Ошибка формирования акта: " + (e?.message || String(e)), "err");
      throw e;
    } finally {
      btn.disabled = false;
    }
  };

  const signBtn = el("button", { type:"button", class:"ghost", text: (Store.get().form?.f_signature_png ? "Подписать акт повторно" : "Подписать акт") });
  signBtn.addEventListener("click", () => {
    Signature.open({ onSave: (dataUrl) => {
      Store.update(d => { d.form.f_signature_png = dataUrl || ""; }, { skipRender:true });
      setStatus(dataUrl ? "Подпись сохранена." : "Подпись очищена.", dataUrl ? "ok" : "muted");
      render();
    }});
  });

    el("svg", { class:"iconPrimary", width:"18", height:"18", viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", "stroke-width":"2", "stroke-linecap":"round", "stroke-linejoin":"round" }, [
      el("path", { d:"M12 3v12" }),
      el("path", { d:"M7 10l5 5 5-5" }),
      el("path", { d:"M5 21h14" })
    ]),
    el("span", { text:"Скачать акт" })
  ]);
  const hasSignatureNow = !!String(Store.get().form?.f_signature_png || "").trim();
  dlBtn.disabled = !hasSignatureNow;
  dlBtn.addEventListener("click", async () => { try { const { pdfBlob, fileName } = await makePdf(dlBtn); downloadBlob(pdfBlob, fileName); } catch {} });

  summaryCard.appendChild(el("div", { class:"actions", style:"margin-top:14px;" }, [signBtn, dlBtn]));
  root.appendChild(summaryCard);

  const sendBtn = el("button", { type:"button", class:"primary" }, [
    el("svg", { width:"18", height:"18", viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", "stroke-width":"2", "stroke-linecap":"round", "stroke-linejoin":"round" }, [
      el("path", { d:"M4 6l8 7 8-7" }),
      el("rect", { x:"4", y:"6", width:"16", height:"12", rx:"2", ry:"2" })
    ]),
    el("span", { text:"Отправить" })
  ]);
  sendBtn.disabled = !hasSignatureNow;
  sendBtn.addEventListener("click", async () => {
    try {
      const { pdfBlob, fileName } = await makePdf(sendBtn);
      if (!navigator.share) { downloadBlob(pdfBlob, fileName); return; }
      try {
        const file = new File([pdfBlob], fileName, { type:"application/pdf" });
        if (navigator.canShare && !navigator.canShare({ files:[file] })) { downloadBlob(pdfBlob, fileName); return; }
        await navigator.share({ files:[file], title:fileName, text:"Акт осмотра (PDF)" });
      } catch (e) { downloadBlob(pdfBlob, fileName); }
    } catch {}
  });

  const backBtn = el("button", { type:"button", class:"backIconBtn", "aria-label":"Назад", onclick: () => goPrev(cfg, "step4") }, [
    el("svg", { width:"20", height:"20", viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", "stroke-width":"2", "stroke-linecap":"round", "stroke-linejoin":"round" }, [el("path", { d:"M15 18l-6-6 6-6" })])
  ]);

  StickyFooter.set(el("div", { class:"actions iconMain" }, [backBtn, sendBtn]));
  root.appendChild(document.createComment("actions-mounted-in-stickyFooter"));
}
function renderUnknownStep(root, step) {
    root.appendChild(el("div", { class:"err", text:`Неизвестный шаг: ${step?.id || "?"}` }));
  }

  // ===============================
  // Wire UI events
  // ===============================
  $("resetBtn").addEventListener("click", async () => {
  const st = Store.get();
  const cfg = st?.config || null;

  const ok = confirm("Начать новый осмотр? Текущие данные осмотра и фото будут удалены.");
  if (!ok) return;

  await Persistence.clearInspectionData();
  ImagePipeline.clearThumbs();
  Signature.set("");

  Store.set(Object.freeze({
    config: cfg,
    stepId: cfg?.ui?.steps?.[0]?.id || "step1",
    form: {},
    damage_items: [],
    current_damage_index: null,
  }));
});

$("configFile").addEventListener("change", async () => {
  const file = $("configFile").files?.[0];
  if (!file) return;

  try {
    const cfg = await readJsonFile(file);
    const errs = validateConfigBasic(cfg);
    if (errs.length) {
      setStatus("Ошибка в Config.DB: " + errs.join("; "), "err");
      return;
    }

    await Persistence.saveConfig(cfg);
    await Persistence.clearInspectionData();
    Signature.set("");

    Store.set(Object.freeze({
      config: cfg,
      stepId: cfg.ui.steps[0]?.id || "step1",
      form: {},
      damage_items: [],
      current_damage_index: null,
    }));

    // ✅ ШАГ 3 — rules engine
    initRulesEngine(cfg);
    if (__rulesErrors?.length) console.warn("Rules engine warnings/errors:", __rulesErrors);

    // ✅ ШАГ 3.2 — image pipeline
    ImagePipeline.clearThumbs();
    try { await ImagePipeline.init(cfg); } catch (e) { console.error(e); }

    // чтобы можно было импортировать тот же файл повторно
    $("configFile").value = "";

    setStatus("Config импортирован и применён.", "ok");
  } catch (e) {
    setStatus("Не удалось прочитать JSON: " + (e?.message || String(e)), "err");
    console.error(e);
  }
});

// ===============================
// Hard boot from embeddedConfig (no waiting, no "Loading...")
// ===============================
let __bootEmbeddedOnce = false;

function bootFromEmbeddedConfig() {
  if (__bootEmbeddedOnce) return false;

  const raw = document.getElementById("embeddedConfig")?.value?.trim();
  if (!raw) return false;

  let cfg;
  try {
    cfg = JSON.parse(raw);
  } catch (e) {
    console.error("embeddedConfig JSON parse failed:", e);
    return false;
  }

  const errs = validateConfigBasic(cfg);
  if (errs.length) {
    console.error("embeddedConfig validation errors:", errs);
    return false;
  }

  __bootEmbeddedOnce = true;

  // rules engine
  initRulesEngine(cfg);

  // стартуем сразу с анкеты
  Store.set(Object.freeze({
    config: cfg,
    stepId: cfg?.ui?.steps?.[0]?.id || "step1",
    form: {},
    damage_items: [],
    current_damage_index: null,
  }), { skipRender:true });

  // pipeline — не должен ломать запуск
  try { ImagePipeline.init(cfg).catch(() => {}); } catch {}

  return true;
}

// ===============================
// Embedded config loader (silent, no UI messages)
// ===============================
function loadEmbeddedConfigOrNull() {
  const raw = document.getElementById("embeddedConfig")?.value?.trim();
  if (!raw) return null;

  try {
    const cfg = JSON.parse(raw);

    // Валидация — если есть, но НЕ блокируем запуск (конфиг у тебя рабочий)
    try {
      if (typeof validateConfigBasic === "function") {
        const errs = validateConfigBasic(cfg);
        if (errs?.length) console.warn("Embedded config validation warnings:", errs);
      }
    } catch (e) {
      console.warn("validateConfigBasic failed:", e);
    }

    return cfg;
  } catch (e) {
    console.error("Embedded config parse error:", e);
    return null;
  }
}

// ===============================
// Startup restore (IndexedDB) + embedded fallback (works on first load)
// ===============================
let restored = null;
let cfg = null;

// 1) Пытаемся восстановить из IDB
try {
  await Persistence.init();
  restored = await Persistence.load();
  cfg = restored?.config || null;
} catch (e) {
  console.warn("Persistence init/restore failed:", e);
}

// 2) Всегда приоритет встроенного конфига (чтобы не тянулся старый порядок шагов из IDB)
{
  let embeddedCfg = loadEmbeddedConfigOrNull();
  if (!embeddedCfg && document.readyState !== "complete") {
    await new Promise(r => {
      if (document.readyState === "complete") { r(); return; }
      window.addEventListener("load", r, { once: true });
    });
    embeddedCfg = loadEmbeddedConfigOrNull();
  }
  if (embeddedCfg) cfg = embeddedCfg;
  // если IDB доступен — синхронизируем актуальный config в хранилище
  try { if (cfg) await Persistence.saveConfig(cfg); } catch {}
}

// 3) Если cfg найден — поднимаем приложение
if (cfg) {
  initRulesEngine(cfg);

  Store.set(Object.freeze({
    config: cfg,
    stepId: restored?.app?.stepId ?? (cfg?.ui?.steps?.[0]?.id || "step1"),
    form: restored?.app?.form || {},
    damage_items: restored?.app?.damage_items || [],
    current_damage_index: restored?.app?.current_damage_index ?? null,
  }), { skipRender:true });

  try { await ImagePipeline.init(cfg); } catch (e) { console.warn("ImagePipeline init failed:", e); }
}

// Debug helper (временное): доступ из консоли DevTools
window.__osmotrum = { Store, Persistence };

  // initial render + subscribe
  Store.subscribe(render);
  render();
</script>
